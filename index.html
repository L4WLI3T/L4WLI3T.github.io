<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Ledger — Expense &amp; Income Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <h1>Ledger</h1>
    <div class="sub" id="authSubtitle">Sign in to sync your expenses across devices.</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="authEmail" autocomplete="email">
    </div>
    <div class="field" id="authPasswordField">
      <label>Password</label>
      <input type="password" id="authPassword" autocomplete="current-password">
    </div>
    <div class="auth-forgot-link" id="authForgotLink"><a>Forgot password?</a></div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>
    <button class="btn btn-gold btn-full" id="authSubmitBtn">Sign in</button>
    <div class="auth-toggle" id="authToggle">New here? <a id="authToggleLink">Create an account</a></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">
      <h1>Ledger</h1>
      <span class="tag">Tracker</span>
    </div>
    <div class="top-actions">
      <span class="email-pill" id="userEmailPill"></span>
      <input type="month" id="monthPicker" class="month-input">
      <button class="btn btn-ghost" id="signOutBtn">Sign out</button>
      <button class="btn btn-gold" id="exportBtn">Export to Excel</button>
    </div>
  </div>

  <nav class="tabs" id="tabs"></nav>

  <div id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
