<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Ledger — Expense &amp; Income Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <h1>Ledger</h1>
    <div class="sub" id="authSubtitle">Sign in to sync your expenses across devices.</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="authEmail" autocomplete="email">
    </div>
    <div class="field" id="authPasswordField">
      <label>Password</label>
      <input type="password" id="authPassword" autocomplete="current-password">
    </div>
    <div class="auth-forgot-link" id="authForgotLink"><a>Forgot password?</a></div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>
    <button class="btn btn-gold btn-full" id="authSubmitBtn">Sign in</button>
    <div class="auth-toggle" id="authToggle">New here? <a id="authToggleLink">Create an account</a></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">
      <h1>Orbit</h1>
      <span class="tag">Ledger</span>
    </div>
    <div class="top-actions">
      <input type="month" id="monthPicker" class="month-input">
      <button class="btn btn-gold" id="exportBtn">Export to Excel</button>
      <div class="profile-wrap" id="profileWrap">
        <button class="profile-avatar" id="profileBtn" aria-label="Account menu">?</button>
        <div class="profile-menu hidden" id="profileMenu">
          <div class="profile-menu-header">
            <div class="profile-avatar-lg" id="profileAvatarLg">?</div>
            <div class="profile-info">
              <div class="profile-email" id="profileEmail"></div>
              <div class="profile-meta" id="profileMemberSince"></div>
            </div>
          </div>
          <div class="profile-menu-divider"></div>
          <div class="profile-menu-item" id="profileInfoToggle">Profile info</div>
          <div class="profile-detail hidden" id="profileDetail"></div>
          <div class="profile-menu-divider"></div>
          <button class="profile-menu-item profile-menu-signout" id="menuSignOutBtn">Sign out</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="tabs" id="tabs"></nav>

  <div id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
